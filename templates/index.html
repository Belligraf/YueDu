<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinese Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-50">
    <div class="max-w-4xl mx-auto p-6">
        <h1 class="text-3xl font-bold text-center mb-8">Chinese Reader</h1>

        <textarea id="inputText" rows="8"
            class="w-full p-4 border rounded-lg focus:outline-none focus:border-blue-500"
            placeholder="Вставьте сюда китайский текст..."></textarea>

        <button onclick="processText()"
            class="mt-4 bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700">
            Разбить на слова
        </button>

        <div id="result" class="mt-8 leading-relaxed text-xl"></div>
    </div>

<!-- Попап с переводом -->
<div id="popup" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white p-6 rounded-xl max-w-2xl w-full mx-4 shadow-2xl flex flex-col max-h-[80vh]">
        <div class="flex justify-between items-start mb-2">
            <div>
                <h2 id="popupWord" class="text-3xl font-bold text-blue-800"></h2>
                <p id="popupPinyin" class="text-xl text-green-700 italic mt-1"></p>
            </div>
            <button onclick="closePopup()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
        </div>

        <!-- Используем div и добавляем прокрутку -->
        <div id="popupTranslation" class="mt-4 overflow-y-auto pr-2 text-gray-800 border-t pt-4">
            <!-- Сюда вставится HTML перевод -->
        </div>

        <button onclick="closePopup()"
            class="mt-6 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 self-end">
            Понятно
        </button>
    </div>
</div>

    <script src="/static/js/script.js"></script>
</body>
</html>
