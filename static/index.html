<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YueDu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-gray-50">

    <!-- ВКЛАДКИ -->
    <div class="max-w-7xl mx-auto pt-6 px-6">
        <div class="flex gap-4 mb-6">
            <button id="tab-simple-btn" onclick="showTab('simple')"
                class="tab-btn px-6 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 font-semibold tab-active">
                📝 Простой ридер
            </button>
            <button id="tab-parallel-btn" onclick="showTab('parallel')"
                class="tab-btn px-6 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 font-semibold">
                📖 Параллельный ридер
            </button>
            <button id="tab-match-btn" onclick="showTab('match')"
                class="tab-btn px-6 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 font-semibold">
                🔗 Сопоставить слова
            </button>
        </div>
    </div>

    <!-- КОНТЕНТ ВКЛАДОК (ЗАГРУЗИТСЯ АВТОМАТИЧЕСКИ) -->
    <div id="content-container"></div>

    <!-- БИБЛИОТЕКА СПРАВА -->
    <div class="fixed right-0 top-0 h-full w-64 bg-white shadow-xl z-40 overflow-y-auto" id="libraryPanel">
        <div class="p-4 border-b">
            <div class="flex justify-between items-center">
                <h3 class="font-bold text-lg text-gray-800">📚 Моя библиотека</h3>
                <button onclick="loadLibrary()" class="text-blue-500 text-sm">🔄 Обновить</button>
            </div>
            <p class="text-xs text-gray-500 mt-1">Кликни для загрузки</p>
        </div>
        <div id="libraryList" class="overflow-y-auto h-[calc(100%-80px)] p-3 space-y-2">
            <div class="text-gray-500 text-center p-4">Загрузка...</div>
        </div>
    </div>

    <!-- ПОПАП ПЕРЕВОДА -->
    <div id="popup" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-xl max-w-2xl w-full mx-4 shadow-2xl flex flex-col max-h-[80vh]">
            <div class="flex justify-between items-start mb-2">
                <div>
                    <h2 id="popupWord" class="text-3xl font-bold text-blue-800"></h2>
                    <p id="popupPinyin" class="text-xl text-green-700 italic mt-1"></p>
                </div>
                <button onclick="closePopup()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
            </div>
            <div id="popupTranslation" class="mt-4 overflow-y-auto pr-2 text-gray-800 border-t pt-4"></div>
            <button onclick="closePopup()" class="mt-6 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 self-end">
                Понятно
            </button>
        </div>
    </div>

    <!-- JS МОДУЛИ -->
    <script src="/static/js/core.js"></script>
    <script src="/static/js/popup.js"></script>
    <script src="/static/js/matches.js"></script>
    <script src="/static/js/modes.js"></script>
    <script src="/static/js/library.js"></script>

    <!-- Автозагрузка вкладок -->
    <script>
    async function loadTabContent(tabName) {
        const container = document.getElementById('content-container');
        const res = await fetch(`/static/modes/${tabName}.html`);
        const html = await res.text();
        container.innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded', async () => {
        await loadTabContent('simple');
        loadLibrary();
        console.log("✅ Готово!");
    });
    </script>
</body>
</html>
