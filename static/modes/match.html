<div id="match-mode" class="max-w-7xl mx-auto p-6">
    <div class="mb-6">
        <h2 class="text-2xl font-bold text-gray-800">🔗 Сопоставление слов</h2>
        <p class="text-gray-600">Кликните на слово → выберите перевод</p>
    </div>

    <div class="grid grid-cols-2 gap-8">
        <div>
            <h3 class="font-bold text-lg mb-3">📖 Китайские слова:</h3>
            <div id="match-original" class="bg-white p-6 rounded-xl shadow-lg text-xl min-h-[500px]"></div>
        </div>
        <div>
            <h3 class="font-bold text-lg mb-3">🌍 Фразы перевода:</h3>
            <div id="match-translation" class="bg-white p-6 rounded-xl shadow-lg text-lg min-h-[500px]"></div>
        </div>
    </div>

    <div class="mt-6 bg-white rounded-xl shadow-lg p-4">
        <h3 class="font-bold text-lg mb-3">📋 Сопоставления:</h3>
        <div id="matches-list" class="space-y-2 max-h-64 overflow-y-auto">
            <div class="text-gray-500 text-center">Нет сопоставлений</div>
        </div>
        <div class="flex gap-3 mt-4">
            <button onclick="saveMatchesToServer()" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700">
                💾 Сохранить сопоставления
            </button>
            <button onclick="clearAllMatches()" class="bg-red-500 text-white px-6 py-2 rounded-lg hover:bg-red-600">
                🗑️ Очистить все
            </button>
        </div>
    </div>
</div>
